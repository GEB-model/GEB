name: Bug Report
description: File a bug report to help us improve GEB.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the following information to help us investigate.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please provide the steps to reproduce the behavior. Also include the branch you are working on, especially if not the main branch. Did you also try in the latest main branch?
      placeholder: |
        1. Use branch 'main'
        2. Run 'geb build' with config '...' (see attached config file)
        3. ...
    validations:
      required: true
  - type: textarea
    id: model_yml
    attributes:
      label: model.yml
      description: |
        Please attach or paste the contents of your `model.yml` file if a model must be build to reproduce the issue. Ensure no "inherit" statements are used in the file, except to the "reasonable_default_config.yml".
        You can drag and drop the file directly into this text box.
      render: yaml
  - type: textarea
    id: build_yml
    attributes:
      label: build.yml
      description: |
        Please attach or paste the contents of your `build.yml` file if a model must be build to reproduce the issue. Ensure no "inherit" statements are used in the file, except to the "reasonable_default_build.yml".
        You can drag and drop the file directly into this text box.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Please provide the log files related to this issue. 
        You can find them in the `logs/` folder inside your model directory.
        Paste the relevant parts here or attach the files.
      placeholder: |
        [YYYY-MM-DD HH:MM:SS] - ERROR - ...
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
