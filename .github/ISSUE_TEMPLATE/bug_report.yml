name: Bug Report
description: File a bug report to help us improve GEB.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the following information to help us investigate.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please provide the steps to reproduce the behavior. Include your build.yml and config.yml if useful.
      placeholder: |
        1. Run 'geb build' with config '...' (see attached config file)
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Please provide the log files related to this issue. 
        You can find them in the `logs/` folder inside your model directory.
        Paste the relevant parts here or attach the files.
      placeholder: |
        [YYYY-MM-DD HH:MM:SS] - ERROR - ...
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
