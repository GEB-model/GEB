# Snakemake SLURM profile for GEB large-scale cluster execution
# This profile configures Snakemake to submit jobs to SLURM with appropriate resources

# Basic SLURM configuration  
# All SLURM logs go to centralized location
cluster: "sbatch --parsable --job-name={rule}_{wildcards.cluster} --account={resources.slurm_account} --ntasks=1 --cpus-per-task={resources.cpus} --mem={resources.mem_mb}M --time=8-00:00:00 --output=/scistor/ivm/tbr910/GEB/sh_scripts/large_scale/logs/snakemake_logs/{rule}_{wildcards.cluster}-%j.out --error=/scistor/ivm/tbr910/GEB/sh_scripts/large_scale/logs/snakemake_logs/{rule}_{wildcards.cluster}-%j.err {resources.partition_arg}"


# Job management
jobs: 8
max-jobs-per-second: 2
max-status-checks-per-second: 0.5

# Partition-specific job limits.
# ivm-fat has only one physical node (node243, 773 GB). Each job requests
# 700 GB, so only 1 job can run at a time without OOM. This is enforced via
# the custom Snakemake resource `ivm_fat_slots=1` declared in each rule;
# Snakemake's scheduler will not submit a second ivm-fat job until the first
# finishes. defq and ivm (small nodes) can run multiple jobs concurrently.
resources:
  ivm_fat_slots: 1

# Resource defaults (will be overridden by rule-specific resources)
# Keep coordinator job lightweight - only cluster rules need large memory
# Use defq for coordinator (no partition specified), cluster rules will override with specific partitions
default-resources:
  - cpus=2
  - mem_mb=4000    # 4GB for lightweight coordinator job
  - runtime=11520  # 8 days in minutes (8 * 24 * 60 = 11520)
  - slurm_partition=defq
  - slurm_account=ivm
  - partition_arg=""  # Empty for defq (default queue), rules will override

# Rerun incomplete jobs and keep going on failures
rerun-incomplete: true
keep-going: true
printshellcmds: true

# Latency wait (important for network filesystems)
latency-wait: 60

# Use conda for environment management if needed
use-conda: false
use-singularity: false
