# Snakemake SLURM profile for GEB large-scale cluster execution
# Compatible with Snakemake >=9.0 and snakemake-executor-plugin-slurm >=2.0

# Use the SLURM executor plugin instead of the legacy cluster: string
executor: slurm

# Job management
jobs: 8
max-jobs-per-second: 2
max-status-checks-per-second: 0.5

# Partition-specific job limits.
# ivm-fat has only one physical node (node243, 773 GB). Each job requests
# 700 GB, so only 1 job can run at a time without OOM. This is enforced via
# the custom Snakemake resource `ivm_fat_slots=1` declared in each rule;
# Snakemake's scheduler will not submit a second ivm-fat job until the first
# finishes. defq and ivm (small nodes) can run multiple jobs concurrently.
resources:
  ivm_fat_slots: 1

# Resource defaults (overridden by rule-specific resources).
# The executor plugin maps these directly to sbatch flags:
#   cpus_per_task -> --cpus-per-task
#   mem_mb        -> --mem (total memory in MB)
#   runtime       -> --time (minutes)
#   slurm_partition -> --partition
#   slurm_account   -> --account
default-resources:
  cpus_per_task: 2
  mem_mb: 4000      # 4 GB for lightweight coordinator job
  runtime: 11520    # 8 days in minutes (8 * 24 * 60 = 11520)
  slurm_partition: defq
  slurm_account: ivm

# Rerun incomplete jobs and keep going on failures
rerun-incomplete: true
keep-going: true
printshellcmds: true

# Latency wait (important for network filesystems)
latency-wait: 60

# SLURM log directory (plugin deletes logs for successful jobs by default)
slurm-logdir: "logs/snakemake_logs"

# Prefix for SLURM job names. The executor plugin uses UUIDs as job names
# for reliable status tracking; rule+wildcard info (e.g. build_cluster/Europe_013)
# is stored in the job comment instead. View it with:
#   squeue -u $USER -o "%i,%P,%.10j,%.40k"
#   sacct -o JobID,State,Comment%40
slurm-jobname-prefix: "geb"
