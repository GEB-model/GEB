# Compatible with Snakemake >=9.0 and snakemake-executor-plugin-slurm >=2.0
# Use the SLURM executor plugin instead of the legacy cluster: string.
# Resource mapping (rule resources → sbatch flags):
#   cpus_per_task   → --cpus-per-task
#   mem_mb          → --mem
#   runtime         → --time (minutes)
#   slurm_partition → --partition
#   slurm_account   → --account
executor: slurm

# Job management
# Snakemake submits up to `jobs` jobs to SLURM simultaneously.  Keeping this
# at 2× the desired concurrency (8) ensures that as soon as a slot frees up
# a new job is already queued and SLURM can schedule it immediately.
jobs: 16
max-jobs-per-second: 2
max-status-checks-per-second: 2

# Resource defaults (overridden by rule-specific resources)
default-resources:
  cpus_per_task: 2
  mem_mb: 4000
  runtime: 11520
  slurm_partition: defq
  slurm_account: ivm

# Auto-retry once on transient failures (node crash, short OOM spike, etc.)
# without requiring manual Snakemake restarts.
restart-times: 1

rerun-incomplete: true
keep-going: true
printshellcmds: true
# Reduce from 60 s so the next job is queued immediately after a slot frees.
latency-wait: 30

# Snakemake 9.x uses UUIDs as job names for reliable status tracking.
# Rule+wildcard info is stored in the SLURM comment field instead.
# View with: squeue -u $USER -o "%.10i %.10P %.10T %.12M %k"
# slurm-logdir is passed explicitly via --slurm-logdir in snakemake_cluster.sh,
# pointing to $GEB_ROOT/logs/snakemake_logs for all log types in one place.
slurm-jobname-prefix: "geb"
